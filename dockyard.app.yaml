# Dockyard manifest — the control plane for this MCP server (RFC §4.2).
# Generated by 'dockyard new'. Edit freely; 'dockyard validate' checks it.
name: go-slides-mcp
title: Go Slides Mcp
version: 0.1.0

runtime:
  # Deployment modes this server supports. stdio is the local single-user
  # mode; add 'http' to also serve the streamable-HTTP transport.
  transports: [stdio]

tools:
  - name: create_deck
    description: Create a new deck and return its deck summary.
    input: internal/contracts.CreateDeckInput
    output: internal/contracts.CreateDeckOutput
    task_support: forbidden
  - name: list_decks
    description: List every stored deck summary.
    input: internal/contracts.ListDecksInput
    output: internal/contracts.ListDecksOutput
    task_support: forbidden
  - name: get_deck
    description: Get one deck by ID or slug and return its current summary.
    input: internal/contracts.GetDeckInput
    output: internal/contracts.GetDeckOutput
    task_support: forbidden
  - name: delete_deck
    description: Delete one deck by ID or slug.
    input: internal/contracts.DeleteDeckInput
    output: internal/contracts.DeleteDeckOutput
    task_support: forbidden
  - name: set_deck_chrome
    description: Replace a deck's header and footer chrome.
    input: internal/contracts.SetDeckChromeInput
    output: internal/contracts.SetDeckChromeOutput
    task_support: forbidden
  - name: set_deck_sections
    description: Replace a deck's named section grouping.
    input: internal/contracts.SetDeckSectionsInput
    output: internal/contracts.SetDeckSectionsOutput
    task_support: forbidden
  - name: add_slide
    description: Add one slide to a deck and return its validation result.
    input: internal/contracts.AddSlideInput
    output: internal/contracts.AddSlideOutput
    task_support: forbidden
  - name: update_slide
    description: Replace one slide in a deck and return its validation result.
    input: internal/contracts.UpdateSlideInput
    output: internal/contracts.UpdateSlideOutput
    task_support: forbidden
  - name: get_slide
    description: Get one slide by deck and slide ID and return its validation result.
    input: internal/contracts.GetSlideInput
    output: internal/contracts.GetSlideOutput
    task_support: forbidden
  - name: remove_slide
    description: Remove one slide from a deck.
    input: internal/contracts.RemoveSlideInput
    output: internal/contracts.RemoveSlideOutput
    task_support: forbidden
  - name: reorder_slides
    description: Replace a deck's slide order.
    input: internal/contracts.ReorderSlidesInput
    output: internal/contracts.ReorderSlidesOutput
    task_support: forbidden
  - name: duplicate_slide
    description: Duplicate one slide in a deck.
    input: internal/contracts.DuplicateSlideInput
    output: internal/contracts.DuplicateSlideOutput
    task_support: forbidden

# A no-template server ships no UI, so there is no apps[] block. Attach a
# Svelte UI later with 'dockyard new --template' or by adding an apps[] entry.

quality:                  # RFC §9.4 — enforced by 'dockyard validate'.
  # UI-state gates are off: this server has no UI to require states of.
  require_loading_state: false
  require_empty_state: false
  require_error_state: false
  require_permission_state: false
  # require_contract_tests applies to every server (the project must carry a
  # contract test); require_fixtures is UI-scoped (it requires inspector
  # fixtures for UI-bearing tools only — this server has none, so it is a
  # no-op until you attach a UI). Both are enforced by 'dockyard validate'.
  require_fixtures: true
  require_contract_tests: true
  require_spec_compliance: true
