# Dockyard manifest — the control plane for this MCP server (RFC §4.2).
# Generated by 'dockyard new'. Edit freely; 'dockyard validate' checks it.
name: go-slides-mcp
title: Go Slides Mcp
version: 0.1.0

runtime:
  # Deployment modes this server supports. stdio is the local single-user
  # mode; add 'http' to also serve the streamable-HTTP transport.
  transports: [stdio]

tools:
  - name: create_deck
    description: Create a new deck and return its deck summary.
    input: internal/contracts.CreateDeckInput
    output: internal/contracts.CreateDeckOutput
    task_support: forbidden
  - name: list_decks
    description: List every stored deck summary.
    input: internal/contracts.ListDecksInput
    output: internal/contracts.ListDecksOutput
    task_support: forbidden
  - name: get_deck
    description: Get one deck by ID or slug and return its current summary.
    input: internal/contracts.GetDeckInput
    output: internal/contracts.GetDeckOutput
    task_support: forbidden
  - name: delete_deck
    description: Delete one deck by ID or slug.
    input: internal/contracts.DeleteDeckInput
    output: internal/contracts.DeleteDeckOutput
    task_support: forbidden
  - name: set_deck_chrome
    description: Replace a deck's header and footer chrome.
    input: internal/contracts.SetDeckChromeInput
    output: internal/contracts.SetDeckChromeOutput
    task_support: forbidden
  - name: set_deck_sections
    description: Replace a deck's named section grouping.
    input: internal/contracts.SetDeckSectionsInput
    output: internal/contracts.SetDeckSectionsOutput
    task_support: forbidden
  - name: add_slide
    description: Add one slide to a deck and return its validation result.
    input: internal/contracts.AddSlideInput
    output: internal/contracts.AddSlideOutput
    task_support: forbidden
  - name: update_slide
    description: Replace one slide in a deck and return its validation result.
    input: internal/contracts.UpdateSlideInput
    output: internal/contracts.UpdateSlideOutput
    task_support: forbidden
  - name: get_slide
    description: Get one slide by deck and slide ID and return its validation result.
    input: internal/contracts.GetSlideInput
    output: internal/contracts.GetSlideOutput
    task_support: forbidden
  - name: remove_slide
    description: Remove one slide from a deck.
    input: internal/contracts.RemoveSlideInput
    output: internal/contracts.RemoveSlideOutput
    task_support: forbidden
  - name: reorder_slides
    description: Replace a deck's slide order.
    input: internal/contracts.ReorderSlidesInput
    output: internal/contracts.ReorderSlidesOutput
    task_support: forbidden
  - name: duplicate_slide
    description: Duplicate one slide in a deck.
    input: internal/contracts.DuplicateSlideInput
    output: internal/contracts.DuplicateSlideOutput
    task_support: forbidden
  - name: edit_slide_node
    description: Replace one slide node at a structural path.
    input: internal/contracts.EditSlideNodeInput
    output: internal/contracts.EditSlideNodeOutput
    task_support: forbidden
  - name: edit_slide_field
    description: Replace one field on a slide node at a structural path.
    input: internal/contracts.EditSlideFieldInput
    output: internal/contracts.EditSlideFieldOutput
    task_support: forbidden
  - name: patch_slide_text
    description: Replace one RichText field on a slide node with plain text.
    input: internal/contracts.PatchSlideTextInput
    output: internal/contracts.PatchSlideTextOutput
    task_support: forbidden
  - name: insert_slide_node
    description: Insert one slide node at a structural path.
    input: internal/contracts.InsertSlideNodeInput
    output: internal/contracts.InsertSlideNodeOutput
    task_support: forbidden
  - name: remove_slide_node
    description: Remove one slide node at a structural path.
    input: internal/contracts.RemoveSlideNodeInput
    output: internal/contracts.RemoveSlideNodeOutput
    task_support: forbidden
  - name: duplicate_slide_node
    description: Duplicate one slide node at a structural path.
    input: internal/contracts.DuplicateSlideNodeInput
    output: internal/contracts.DuplicateSlideNodeOutput
    task_support: forbidden
  - name: move_slide_node
    description: Move one slide node between structural paths.
    input: internal/contracts.MoveSlideNodeInput
    output: internal/contracts.MoveSlideNodeOutput
    task_support: forbidden
  - name: bootstrap_soul
    description: Bootstrap one design soul from a small set of token overrides.
    input: internal/contracts.BootstrapSoulInput
    output: internal/contracts.BootstrapSoulOutput
    task_support: forbidden
  - name: refine_soul
    description: Refine one stored soul with targeted token overrides.
    input: internal/contracts.RefineSoulInput
    output: internal/contracts.RefineSoulOutput
    task_support: forbidden
  - name: list_souls
    description: List every stored soul summary.
    input: internal/contracts.ListSoulsInput
    output: internal/contracts.ListSoulsOutput
    task_support: forbidden
  - name: get_soul
    description: Get one stored soul, optionally including its style guide.
    input: internal/contracts.GetSoulInput
    output: internal/contracts.GetSoulOutput
    task_support: forbidden
  - name: get_design_tokens
    description: Get the flattened design token list for one stored soul.
    input: internal/contracts.GetDesignTokensInput
    output: internal/contracts.GetDesignTokensOutput
    task_support: forbidden
  - name: save_as_template
    description: Save one stored slide as a reusable recipe template.
    input: internal/contracts.SaveAsTemplateInput
    output: internal/contracts.SaveAsTemplateOutput
    task_support: forbidden
  - name: list_recipes
    description: List every stored recipe summary, built-ins first.
    input: internal/contracts.ListRecipesInput
    output: internal/contracts.ListRecipesOutput
    task_support: forbidden
  - name: apply_recipe
    description: Apply one stored recipe as a new slide in a deck.
    input: internal/contracts.ApplyRecipeInput
    output: internal/contracts.ApplyRecipeOutput
    task_support: forbidden
  - name: upload_asset
    description: Upload one binary asset and return its stored metadata.
    input: internal/contracts.UploadAssetInput
    output: internal/contracts.UploadAssetOutput
    task_support: forbidden
  - name: list_assets
    description: List every stored asset metadata summary.
    input: internal/contracts.ListAssetsInput
    output: internal/contracts.ListAssetsOutput
    task_support: forbidden
  - name: get_asset
    description: Get one stored asset metadata summary by asset ID.
    input: internal/contracts.GetAssetInput
    output: internal/contracts.GetAssetOutput
    task_support: forbidden
  - name: delete_asset
    description: Delete one stored asset by asset ID.
    input: internal/contracts.DeleteAssetInput
    output: internal/contracts.DeleteAssetOutput
    task_support: forbidden
  - name: add_comment
    description: Add one collaboration comment to a deck, slide, or node.
    input: internal/contracts.AddCommentInput
    output: internal/contracts.AddCommentOutput
    task_support: forbidden
  - name: list_comments
    description: List stored collaboration comments for one deck.
    input: internal/contracts.ListCommentsInput
    output: internal/contracts.ListCommentsOutput
    task_support: forbidden
  - name: resolve_comment
    description: Resolve one stored collaboration comment by comment ID.
    input: internal/contracts.ResolveCommentInput
    output: internal/contracts.ResolveCommentOutput
    task_support: forbidden
  - name: validate_slide_ir
    description: Validate one slide IR snapshot without storage.
    input: internal/contracts.ValidateSlideIRInput
    output: internal/contracts.ValidateSlideIROutput
    task_support: forbidden
  - name: validate_slide
    description: Validate one stored slide by deck and slide ID.
    input: internal/contracts.ValidateSlideInput
    output: internal/contracts.ValidateSlideOutput
    task_support: forbidden
  - name: validate_deck_for_export
    description: Validate every slide in one deck and report export blockers.
    input: internal/contracts.ValidateDeckForExportInput
    output: internal/contracts.ValidateDeckForExportOutput
    task_support: forbidden
  - name: export_deck
    description: Export one deck to a deterministic .pptx path and deck:// resource.
    input: internal/contracts.ExportDeckInput
    output: internal/contracts.ExportDeckOutput
    task_support: forbidden
  - name: list_resources
    description: List every exported deck:// resource currently present on disk.
    input: internal/contracts.ListResourcesInput
    output: internal/contracts.ListResourcesOutput
    task_support: forbidden
  - name: get_resource
    description: Resolve one deck:// resource URI to its backing export path.
    input: internal/contracts.GetResourceInput
    output: internal/contracts.GetResourceOutput
    task_support: forbidden
  - name: get_session
    description: Get the active in-memory workspace session and build info.
    input: internal/contracts.GetSessionInput
    output: internal/contracts.GetSessionOutput
    task_support: forbidden
  - name: get_deck_overview
    description: Get the structure/reorder view of one deck for the overview surface.
    input: internal/contracts.GetDeckOverviewInput
    output: internal/contracts.GetDeckOverviewOutput
    task_support: forbidden
  - name: open_slide_editor
    description: Open one slide's full IR for editing in the slide-editor surface.
    input: internal/contracts.OpenSlideEditorInput
    output: internal/contracts.OpenSlideEditorOutput
    task_support: forbidden
  - name: get_deck_state
    description: Get the rich hydration payload for the deck-overview surfaces on mount.
    input: internal/contracts.GetDeckStateInput
    output: internal/contracts.GetDeckStateOutput
    task_support: forbidden
  - name: set_active_workspace
    description: Set the active workspace deck and soul in the session.
    input: internal/contracts.SetActiveWorkspaceInput
    output: internal/contracts.SetActiveWorkspaceOutput
    task_support: forbidden
  - name: compile_chart
    description: Rasterize a chart spec to a PNG (pure Go), store it as an asset, and return a chart IR node.
    input: internal/contracts.CompileChartInput
    output: internal/contracts.CompileChartOutput
    task_support: forbidden
  - name: compile_markdown
    description: Parse markdown source into Deckard slide IR leaf nodes (headings, lists, quotes, prose).
    input: internal/contracts.CompileMarkdownInput
    output: internal/contracts.CompileMarkdownOutput
    task_support: forbidden

# A no-template server ships no UI, so there is no apps[] block. Attach a
# Svelte UI later with 'dockyard new --template' or by adding an apps[] entry.

quality:                  # RFC §9.4 — enforced by 'dockyard validate'.
  # UI-state gates are off: this server has no UI to require states of.
  require_loading_state: false
  require_empty_state: false
  require_error_state: false
  require_permission_state: false
  # require_contract_tests applies to every server (the project must carry a
  # contract test); require_fixtures is UI-scoped (it requires inspector
  # fixtures for UI-bearing tools only — this server has none, so it is a
  # no-op until you attach a UI). Both are enforced by 'dockyard validate'.
  require_fixtures: true
  require_contract_tests: true
  require_spec_compliance: true
